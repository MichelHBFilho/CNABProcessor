services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cnab
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
  api:
    image: backend:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cnab
    depends_on:
      - db
  spa:
    image: frontend:latest
    ports:
      - "9090:9090"
    depends_on:
      - api